<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Projects — Deborah Kirk Interiors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Jost',sans-serif;background:#FAF8F4;color:#28231C}
:root{
  --warm:#FAF8F4;--sand:#F4EFE6;--sand2:#EDE6D8;--sand3:#E3DACB;
  --clay:#B89470;--clay2:#9A7A56;--bark:#5C4A34;--charcoal:#28231C;
  --muted:#7B7168;--muted2:#9E9589;
  --border:rgba(92,74,52,0.12);--border2:rgba(92,74,52,0.22);
}

/* Header */
.pg-header{
  padding:3rem 5rem 2.5rem;
  background:var(--sand);
  border-bottom:0.5px solid var(--border2);
  display:flex;align-items:flex-end;justify-content:space-between;
}
.pg-header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,3.5vw,46px);font-weight:300;color:var(--charcoal);line-height:1.15;
}
.pg-back{
  font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--muted);border-bottom:0.5px solid var(--border2);padding-bottom:4px;
  text-decoration:none;transition:color 0.25s,border-color 0.25s;
}
.pg-back:hover{color:var(--clay);border-color:var(--clay)}

/* Filter */
.filter-wrap{
  padding:2rem 5rem 1rem;
  background:var(--sand);
  display:flex;gap:0.25rem;
}
.f-btn{
  padding:7px 16px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted);border:0.5px solid transparent;transition:all 0.25s;font-weight:300;
  background:none;cursor:pointer;font-family:'Jost',sans-serif;
}
.f-btn.on{color:var(--charcoal);border-color:var(--border2)}
.f-btn:hover{color:var(--charcoal)}

/* Grid */
.port-wrap{padding:2rem 5rem 6rem;background:var(--sand)}
.port-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:280px;
  gap:12px;
}
.pc{position:relative;overflow:hidden;background:var(--sand2);cursor:pointer}
.pc img{width:100%;height:100%;object-fit:cover;transition:transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.4s;filter:brightness(0.88)}
.pc:hover img{transform:scale(1.06);filter:brightness(1)}
.pc-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(40,35,28,0.72) 0%,transparent 55%);opacity:0;transition:opacity 0.45s}
.pc:hover .pc-veil{opacity:1}
.pc-info{position:absolute;bottom:0;left:0;right:0;padding:1.8rem;transform:translateY(7px);transition:transform 0.45s}
.pc:hover .pc-info{transform:translateY(0)}
.pc-cat{font-size:9.5px;letter-spacing:0.26em;text-transform:uppercase;color:var(--clay);margin-bottom:0.3rem;opacity:0;transition:opacity 0.45s 0.05s}
.pc:hover .pc-cat{opacity:1}
.pc-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--warm);line-height:1.2;opacity:0;transition:opacity 0.45s 0.1s}
.pc:hover .pc-title{opacity:1}

/* Lightbox */
.lb-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(28,22,16,0.96);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity 0.35s;
  overflow-y:auto;
}
.lb-overlay.open{opacity:1;pointer-events:auto}
.lb-header{
  position:sticky;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.4rem 2.5rem;
  background:rgba(28,22,16,0.97);
  border-bottom:0.5px solid rgba(255,255,255,0.08);
  z-index:2;flex-shrink:0;
}
.lb-meta{display:flex;flex-direction:column;gap:0.25rem}
.lb-cat{font-size:9.5px;letter-spacing:0.26em;text-transform:uppercase;color:var(--clay)}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--warm);letter-spacing:0.02em}
.lb-close{
  width:42px;height:42px;border:0.5px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.7);font-size:20px;line-height:1;
  cursor:pointer;transition:border-color 0.2s,color 0.2s;flex-shrink:0;
}
.lb-close:hover{border-color:var(--clay);color:var(--clay)}
.lb-grid{display:flex;flex-direction:column;gap:20px;padding:20px;width:100%;box-sizing:border-box;align-items:center;}
.lb-grid-img{display:block;width:auto;height:auto;max-width:calc(100vw - 40px);max-height:88vh;object-fit:contain;margin:0 auto;}

@media(max-width:900px){
  .pg-header,.filter-wrap,.port-wrap{padding-left:1.5rem;padding-right:1.5rem}
  .port-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:200px}
}
@media(max-width:500px){
  .port-grid{grid-template-columns:1fr;grid-auto-rows:260px}
}
</style>

  </div>

<script>
/* Filter */
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const f = btn.dataset.f;
    document.querySelectorAll('.pc').forEach(c => {
      const match = f === 'all' || c.dataset.cat === f;
      c.style.display = match ? '' : 'none';
    });
  });
});

/* Lightbox */
(function(){
  const overlay = document.getElementById('lbOverlay');
  const lbTitle = document.getElementById('lbTitle');
  const lbCat   = document.getElementById('lbCat');
  const lbGrid  = document.getElementById('lbGrid');
  const lbClose = document.getElementById('lbClose');

  function openGallery(card){
    const cardImg = card.querySelector('img');
    const title   = card.querySelector('.pc-title') ? card.querySelector('.pc-title').textContent : '';
    const cat     = card.querySelector('.pc-cat')   ? card.querySelector('.pc-cat').textContent   : '';
    const extras  = card.dataset.gallery ? card.dataset.gallery.split('|').map(s=>s.trim()) : [];
    const srcs    = [cardImg ? cardImg.src : ''].concat(extras);
    lbTitle.textContent = title;
    lbCat.textContent   = cat;
    lbGrid.innerHTML    = '';
    srcs.forEach(src=>{
      const img = document.createElement('img');
      img.className = 'lb-grid-img';
      img.src = src;
      img.alt = title;
      lbGrid.appendChild(img);
    });
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    overlay.scrollTop = 0;
    lbClose.focus();
  }

  function closeGallery(){
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.pc').forEach(card=>{
    card.addEventListener('click', ()=>openGallery(card));
  });
  lbClose.addEventListener('click', closeGallery);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeGallery(); });
  document.addEventListener('keydown', e=>{
    if(overlay.classList.contains('open') && e.key==='Escape') closeGallery();
  });
})();
</script>
