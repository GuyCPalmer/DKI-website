  <!-- Teeth suggestions -->
  <line x1="54" y1="77" x2="54" y2="82" stroke="#B89470" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="78" x2="60" y2="83" stroke="#B89470" stroke-width="0.8" opacity="0.5"/>
  <line x1="66" y1="77" x2="66" y2="82" stroke="#B89470" stroke-width="0.8" opacity="0.5"/>
